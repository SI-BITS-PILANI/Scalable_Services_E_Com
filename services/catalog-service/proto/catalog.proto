syntax = "proto3";

package catalog;

service CatalogService {
  // Validate a basket of items: checks existence, stock and returns priced lines.
  rpc ValidateProducts (ValidateProductsRequest) returns (ValidateProductsResponse);
  // Fetch a single product by id.
  rpc GetProduct (GetProductRequest) returns (ProductResponse);
}

message GetProductRequest {
  string product_id = 1;
}

message ProductResponse {
  string product_id = 1;
  string name = 2;
  double price = 3;
  int32 stock = 4;
  bool available = 5;
}

message OrderItemInput {
  string product_id = 1;
  int32 quantity = 2;
}

message ValidateProductsRequest {
  repeated OrderItemInput items = 1;
}

message ValidatedItem {
  string product_id = 1;
  string name = 2;
  double price = 3;
  int32 quantity = 4;
  double subtotal = 5;
  bool available = 6;
}

message ValidateProductsResponse {
  bool all_available = 1;
  repeated ValidatedItem items = 2;
  double total = 3;
}
