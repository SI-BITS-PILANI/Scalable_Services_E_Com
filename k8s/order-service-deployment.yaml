apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\Users\z004kryx\AppData\Local\Microsoft\WinGet\Packages\Kubernetes.kompose_Microsoft.Winget.Source_8wekyb3d8bbwe\kompose.exe convert -f .\docker-compose.yml -o .\k8s\
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: order-service
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: order-service
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: C:\Users\z004kryx\AppData\Local\Microsoft\WinGet\Packages\Kubernetes.kompose_Microsoft.Winget.Source_8wekyb3d8bbwe\kompose.exe convert -f .\docker-compose.yml -o .\k8s\
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: order-service
    spec:
      initContainers:
        - name: wait-for-postgres-order
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - until pg_isready -h postgres-order -p 5432 -U postgres -d postgres; do echo waiting for postgres-order; sleep 2; done
      containers:
        - env:
            - name: CATALOG_GRPC_HOST
              value: catalog-service
            - name: CATALOG_GRPC_PORT
              value: "50051"
            - name: DATABASE_URL
              value: postgresql+psycopg://order_user:order_password@postgres-order:5432/order_db
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:8003
            - name: RABBITMQ_EXCHANGE
              value: ecom.events
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672/
          image: scalable_services_e_com-order-service:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - import urllib.request; urllib.request.urlopen('http://localhost:8002/health')
            failureThreshold: 8
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          startupProbe:
            exec:
              command:
                - python
                - -c
                - import urllib.request; urllib.request.urlopen('http://localhost:8002/health')
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          name: order-service
          ports:
            - containerPort: 8002
              protocol: TCP
      restartPolicy: Always
