services:
  postgres:
    image: postgres:16-alpine
    container_name: ecom-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  mongodb:
    image: mongo:7
    container_name: ecom-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ecom-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  catalog-service:
    build:
      context: ./services/catalog-service
    container_name: catalog-service
    environment:
      MONGO_URI: mongodb://mongodb:27017
      DB_NAME: catalog_db
      REST_PORT: 8001
      GRPC_PORT: 50051
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: ecom.events
      RABBITMQ_QUEUE: catalog-service.queue
      RABBITMQ_BINDING_KEYS: catalog.*
    ports:
      - "8001:8001"
      - "50051:50051"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  payment-service:
    build:
      context: ./services/payment-service
    container_name: payment-service
    environment:
      PORT: 8003
      NODE_ENV: production
      PAYMENT_DB_HOST: postgres
      PAYMENT_DB_PORT: 5432
      PAYMENT_DB_NAME: payment_db
      PAYMENT_DB_USER: payment_user
      PAYMENT_DB_PASSWORD: payment_password
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: ecom.events
      RABBITMQ_ORDER_CREATED_QUEUE: payment.order-created.queue
      RABBITMQ_ORDER_CREATED_KEY: order.OrderCreated
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s

  order-service:
    build:
      context: ./services/order-service
    container_name: order-service
    environment:
      DATABASE_URL: postgresql+psycopg://order_user:order_password@postgres:5432/order_db
      CATALOG_GRPC_HOST: catalog-service
      CATALOG_GRPC_PORT: 50051
      PAYMENT_SERVICE_URL: http://payment-service:8003
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_EXCHANGE: ecom.events
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  notification-service:
    build:
      context: ./services/notification-service
    container_name: notification-service
    environment:
      MONGO_URI: mongodb://mongodb:27017
      DB_NAME: notification_db
      REST_PORT: 8004
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    ports:
      - "8004:8004"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: api-gateway
    environment:
      PORT: 8000
      JWT_SECRET: super-secret-demo-key-change-me
      CATALOG_BASE_URL: http://catalog-service:8001
      ORDER_BASE_URL: http://order-service:8002
      PAYMENT_BASE_URL: http://payment-service:8003
      NOTIFICATION_BASE_URL: http://notification-service:8004
      RATE_LIMIT_PER_MINUTE: 60
    ports:
      - "8000:8000"
    depends_on:
      catalog-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s

volumes:
  postgres-data:
  mongodb-data:
