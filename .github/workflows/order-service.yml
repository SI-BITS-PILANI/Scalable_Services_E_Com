# Order Service — CI
# Triggers: push/PR to services/order-service/**
# Runs: unit tests → Docker build

name: Order Service

on:
  push:
    branches: [main, develop]
    paths:
      - "services/order-service/**"
  pull_request:
    branches: [main]
    paths:
      - "services/order-service/**"

defaults:
  run:
    working-directory: services/order-service

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ---------------------------------------------------------
  # 1. Unit tests
  # ---------------------------------------------------------
  test:
    name: Unit Tests (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: services/order-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate gRPC stubs
        run: python -m grpc_tools.protoc -I./app/proto --python_out=. --grpc_python_out=. ./app/proto/catalog.proto

      - name: Run tests
        run: pytest -v --tb=short

  # ---------------------------------------------------------
  # 2. Build Docker image
  # ---------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./services/order-service
          push: false
          tags: order-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------
  # 3. Push image (on main only)
  # ---------------------------------------------------------
  push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase repository
        id: repo
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/order-service
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}/order-service:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.repo }}/order-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
