# Payment Service — CI
# Triggers: push/PR to services/payment-service/**
# Runs: unit tests → Docker build

name: Payment Service

on:
  push:
    branches: [main, develop]
    paths:
      - "services/payment-service/**"
  pull_request:
    branches: [main]
    paths:
      - "services/payment-service/**"

defaults:
  run:
    working-directory: services/payment-service

env:
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------
  # 1. Unit tests
  # ---------------------------------------------------------
  test:
    name: Unit Tests (Node.js 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: services/payment-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ---------------------------------------------------------
  # 2. Build Docker image
  # ---------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./services/payment-service
          push: false
          tags: payment-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------
  # 3. Push image (on main only)
  # ---------------------------------------------------------
  push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/payment-service
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/payment-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/payment-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
