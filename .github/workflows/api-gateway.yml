# API Gateway — CI
# Triggers: push/PR to services/api-gateway/**
# Runs: typecheck → unit tests → Docker build

name: API Gateway

on:
  push:
    branches: [main, develop]
    paths:
      - "services/api-gateway/**"
  pull_request:
    branches: [main]
    paths:
      - "services/api-gateway/**"

defaults:
  run:
    working-directory: services/api-gateway

env:
  NODE_VERSION: "22"

jobs:
  # ---------------------------------------------------------
  # 1. Type check
  # ---------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: services/api-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

  # ---------------------------------------------------------
  # 2. Unit tests
  # ---------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: services/api-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ---------------------------------------------------------
  # 3. Build Docker image
  # ---------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          push: false
          tags: api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------
  # 4. Push image (on main only)
  # ---------------------------------------------------------
  push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase repository
        id: repo
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}/api-gateway:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.repo }}/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
